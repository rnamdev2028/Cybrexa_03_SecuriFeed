          isPhishing: false,

      // -------------------------------------------------------------
      // High-Fidelity Local Dissection Fallback Engine
      // -------------------------------------------------------------
      const runLocalFallbackAnalysis = (raw) => {
        let sanitized = raw.replace(/<[^>]*>/g, '').trim();

        let testingUrl = sanitized;
        if (!/^https?:\/\//i.test(testingUrl)) {
          testingUrl = 'http://' + testingUrl;
        }

        let parsed;
        try {
          parsed = new URL(testingUrl);
        } catch (e) {
          const domainMatch = testingUrl.match(/^https?:\/\/([^\/?#]+)(?:[\/?#]|$)/i);
          const domain = domainMatch ? domainMatch[1] : testingUrl;
          parsed = {
            hostname: domain,
            protocol: testingUrl.startsWith('https') ? 'https:' : 'http:',
            port: '',
            pathname: ''
          };
        }

        const host = parsed.hostname.toLowerCase();
        const isHttps = parsed.protocol === 'https:';

        const ipV4Regex = /^(?:[0-9]{1,3}\.){3}[0-9]{1,3}$/;
        const ipV6Regex = /^\[?[a-f0-9]*:[a-f0-9:]+\]?$/i;
        const isIpUrl = ipV4Regex.test(host) || ipV6Regex.test(host);

        const isHomoglyph = /[^\u0000-\u007F]/.test(host);

        const suspiciousKeywords = ['paypal', 'netflix', 'chase', 'google', 'apple', 'signin', 'login', 'secure', 'verify', 'update', 'accounts', 'billing', 'support', 'bank'];
        const brandCheckwords = ['paypa1', 'g00gle', 'netflix-', 'chase-', 'verification-', 'support-'];
        
        let isTyposquatting = false;
        let includesSuspiciousWords = false;

        for (const term of brandCheckwords) {
          if (host.includes(term)) {
            isTyposquatting = true;
          }
        }

        for (const kw of suspiciousKeywords) {
          if (host.includes(kw)) {
            includesSuspiciousWords = true;
            if (kw === 'google' && !host.endsWith('.google.com') && host !== 'google.com') isTyposquatting = true;
            if (kw === 'paypal' && !host.endsWith('.paypal.com') && host !== 'paypal.com') isTyposquatting = true;
            if (kw === 'netflix' && !host.endsWith('.netflix.com') && host !== 'netflix.com') isTyposquatting = true;
            if (kw === 'chase' && !host.endsWith('.chase.com') && host !== 'chase.com') isTyposquatting = true;
            if (kw === 'apple' && !host.endsWith('.apple.com') && host !== 'apple.com') isTyposquatting = true;
          }
        }

        const subdomainsCount = host.split('.').length - 2;
        const isSubdomainsSpam = subdomainsCount > 3;

        let score = 0;
        const checks = [];

        if (isHttps) {
          checks.push({
            name: 'TLS/SSL Layer encryption',
            status: 'pass',
            message: 'The connection is encrypted using modern secure HTTPS protocol.'
          });
        } else {
          score += 25;
          checks.push({
            name: 'TLS/SSL Layer encryption',
            status: 'fail',
            message: 'HTTP connection detected. Missing secure encryption. Eavesdroppers can intercept logins.'
          });
        }

        if (isIpUrl) {
          score += 35;
          checks.push({
            name: 'Hostname Evaluation',
            status: 'fail',
            message: 'Suspicious IP address hostname instead of generic Domain Name registry.'
          });
        } else {
          checks.push({
            name: 'Hostname Evaluation',
            status: 'pass',
            message: 'Valid host string present.'
          });
        }

        if (isHomoglyph) {
          score += 25;
          checks.push({
            name: 'Internationalized character (IDN/Homoglyph) inspection',
            status: 'fail',
            message: 'Unicode homoglyphs found. Characters mimic standard ASCII letters to spoof trusted brands.'
          });
        } else {
          checks.push({
            name: 'Internationalized character (IDN/Homoglyph) inspection',
            status: 'pass',
            message: 'Pure ASCII characters detected. No homoglyphs spoofing identified.'
          });
        }

        if (isTyposquatting) {
          score += 30;
          checks.push({
            name: 'Phishing Typosquatting Matcher',
            status: 'fail',
            message: 'Lookalike spelling variations or brand labels matched against our internal scam database.'
          });
        } else if (includesSuspiciousWords) {
          score += 15;
          checks.push({
            name: 'Phishing Typosquatting Matcher',
            status: 'warning',
            message: 'Includes core security keywords (e.g. login, verification) out of standard authoritative domain context.'
          });
        } else {
          checks.push({
            name: 'Phishing Typosquatting Matcher',
            status: 'pass',
            message: 'Domain name appears distinct from high-frequency spoofed brands.'
          });
        }

        if (isSubdomainsSpam) {
          score += 15;
          checks.push({
            name: 'Subdomain Chain Depth Check',
            status: 'warning',
            message: 'Multiple subdomain nesting blocks (e.g. accounts.support.paypal.signin...). Usually registered for distraction scams.'
          });
        } else {
          checks.push({
            name: 'Subdomain Chain Depth Check',
            status: 'pass',
            message: 'Nesting configuration standard.'
          });
        }

        const badTLDs = ['.xyz', '.click', '.online', '.work', '.info', '.top', '.zip'];
        let isBadTLD = false;
        for (const tld of badTLDs) {
          if (host.endsWith(tld)) {
            isBadTLD = true;
          }
        }

        if (isBadTLD) {
          score += 10;
          checks.push({
            name: 'Top-Level Domain Suffix Check',
            status: 'warning',
            message: `Suffix ${host.substring(host.lastIndexOf('.'))} has a high correlation with throwaway phishing servers.`
          });
        } else {
          checks.push({
            name: 'Top-Level Domain Suffix Check',
            status: 'pass',
            message: 'Authorized generic global TLD suffix.'
          });
        }

        score = Math.min(100, Math.max(isHttps ? 5 : 20, score));
        const riskLvl = score >= 70 ? 'High' : score >= 35 ? 'Medium' : 'Low';

        return {
          url: raw,
          sanitizedUrl: sanitized,
          riskScore: score,
          riskLevel: riskLvl,
          sslInfo: {
            hasSsl: isHttps,
            protocol: isHttps ? 'HTTPS/TLS v1.3' : 'HTTP/1.1 (UNENCRYPTED)',
            warning: isHttps ? null : 'Unencrypted Cleartext Channel Detected! Legitimate bank desks, social nets, and workspaces will NEVER use raw HTTP entries.',
            port: parsed.port ? parseInt(parsed.port) : (isHttps ? 443 : 80)
          },
          patternsDetected: {
            Typosquatting: isTyposquatting,
            IpUrl: isIpUrl,
            Homoglyphs: isHomoglyph,
            SuspiciousWords: includesSuspiciousWords,
            Subdomains: isSubdomainsSpam

          aiInsight: "Local rule analyzer operating in standalone mode. Complete diagnostics complete. To unlock advanced live AI security assessments, please host this app with Node.js and supply your proprietary secure API Key.",

        const [urlInput, setUrlInput] = useState('');
        const [isLoading, setIsLoading] = useState(false);
        const [result, setResult] = useState(null);
        const [error, setError] = useState(null);

        const handleClear = () => {
          setUrlInput('');
          setResult(null);
          setError(null);
        };

        const handleAnalyze = (e) => {
          e.preventDefault();
          if (!urlInput.trim()) {
            setError('Please provide a URL to analyze.');
            return;
          }

          setIsLoading(true);
          setError(null);

          const rawUrl = urlInput.trim();

      function PhishGameView() {
        const [scenarios, setScenarios] = useState(GAME_SCENARIOS);
        const [currentIndex, setCurrentIndex] = useState(0);
        const [hasAnswered, setHasAnswered] = useState(false);
        const [selectedAns, setSelectedAns] = useState(null);
        const [stats, setStats] = useState({
          score: 0,
          streak: 0,
          levelsCompleted: 1,
          totalAnswered: 0,
          correctAnswers: 0,
        });
        const [isGameFinished, setIsGameFinished] = useState(false);

        const activeScenario = scenarios[currentIndex];

        const handleDecision = (userSelectedPhishing) => {
          if (hasAnswered) return;

          setHasAnswered(true);
          setSelectedAns(userSelectedPhishing);

          const isCorrect = userSelectedPhishing === activeScenario.isPhishing;
          const additionalScore = isCorrect ? (activeScenario.difficulty === 'hard' ? 25 : activeScenario.difficulty === 'medium' ? 15 : 10) : 0;

          setStats((prev) => {
            const nextStreak = isCorrect ? prev.streak + 1 : 0;
            const nextScore = prev.score + additionalScore;
            const nextLevel = Math.max(prev.levelsCompleted, Math.floor(nextScore / 50) + 1);
            
            return {
              score: nextScore,
              streak: nextStreak,
              levelsCompleted: nextLevel,
              totalAnswered: prev.totalAnswered + 1,
              correctAnswers: prev.correctAnswers + (isCorrect ? 1 : 0)
            };
          });
        };

        const handleNext = () => {
          setHasAnswered(false);
          setSelectedAns(null);

          if (currentIndex + 1 < scenarios.length) {
            setCurrentIndex((prev) => prev + 1);
          } else {
            setIsGameFinished(true);
          }
        };

        const handleRestart = () => {
          setCurrentIndex(0);
          setHasAnswered(false);
          setSelectedAns(null);
          setIsGameFinished(false);
          setStats({
            score: 0,
            streak: 0,
            levelsCompleted: 1,
            totalAnswered: 0,
            correctAnswers: 0,
          });
        };

        return (
          <div className="space-y-12 animate-fade-in max-w-5xl mx-auto text-white">
            <div className="flex flex-col md:flex-row justify-between items-start md:items-baseline border-b border-white/10 pb-8 gap-6">
              <div>
                <label className="text-[10px] uppercase tracking-[0.25em] text-white/40 font-mono block mb-2">
                  Workspace Academy // Reflex Board
                </label>
                <h2 className="text-3xl md:text-4xl font-serif italic text-white font-medium">
                  PhishDetect Reflex Simulator Training.
                </h2>
                <p className="text-[#A0A0A5] text-sm mt-2 max-w-2xl leading-relaxed">
                  Strengthen standard employee firewalls. Spot typosquatting subdomains, Homoglyph Unicode spoofs, cleartext HTTP credentials inputs, or high-urgency business emails.
                </p>
              </div>

              {/* Stats badges */}
              <div className="flex flex-wrap gap-4 font-mono uppercase tracking-widest text-[9px] text-[#A0A0A5]">
                <div className="bg-[#0F0F11] border border-white/10 py-2 px-4">
                  LEVEL: <span className="text-white font-bold">0{stats.levelsCompleted}</span>
                </div>
                <div className="bg-[#0F0F11] border border-white/10 py-2 px-4">
                  SCORE: <span className="text-emerald-400 font-bold">{stats.score}</span> XP
                </div>
                <div className="bg-[#0F0F11] border border-white/10 py-2 px-4">
                  STREAK: <span className="text-rose-500 font-bold">{stats.streak} 🔥</span>
                </div>
              </div>
            </div>

            {isGameFinished ? (
              <div className="bg-[#0F0F11] border border-white/10 p-12 max-w-2xl mx-auto text-center space-y-8 relative overflow-hidden">
                <div className="text-emerald-400 text-5xl">🛡️</div>
                <div className="space-y-2">
                  <h3 className="text-3xl font-serif italic text-white font-medium">Reflex Deck Fully Evaluated.</h3>
                  <p className="text-[#A0A0A5] text-xs uppercase tracking-widest font-mono">Digital hygiene metrics summary:</p>
                </div>

                <div className="grid grid-cols-2 gap-6 bg-black/60 p-6 border border-white/10 font-mono text-xs">
                  <div className="p-4 border-r border-white/10">
                    <span className="text-white/40 block mb-2 uppercase tracking-widest text-[9px]">Decision Accuracy</span>
                    <strong className="text-3xl font-bold text-emerald-400">
                      {stats.totalAnswered > 0 ? Math.round((stats.correctAnswers / stats.totalAnswered) * 100) : 0}%
                    </strong>
                  </div>
                  <div className="p-4">
                    <span className="text-white/40 block mb-2 uppercase tracking-widest text-[9px]">Total Points Accrued</span>
                    <strong className="text-3xl font-bold text-white">{stats.score} XP</strong>
                  </div>
                </div>

                <div className="text-sm text-[#A0A0A5] max-w-lg mx-auto leading-relaxed italic font-serif">
                  {stats.correctAnswers === stats.totalAnswered ? (
                    <span>"Absolute digital vigilance! You spotted every single homoglyph spoof and malicious attachment vector without raising false notifications. Standard Security Officer qualification."</span>
                  ) : (
                    <span>"A highly responsive human firewall. You accurately flagged critical domain spoofs, but some complex character lookalikes or structural tricks bypassed your check. Continued practice recommended."</span>
                  )}
                </div>

                <div>
                  <button
                    onClick={handleRestart}
                    className="px-6 py-3 bg-white text-black font-semibold text-xs tracking-widest uppercase hover:bg-neutral-200 transition-colors rounded-none cursor-pointer"
                  >
                    Restart Academy Course
                  </button>
                </div>
              </div>
            ) : (
              <div className="grid grid-cols-1 lg:grid-cols-3 gap-8 items-start">
                <div className="lg:col-span-2 space-y-6">
                  <div className="bg-[#0F0F11] border border-white/10 px-6 py-4 flex justify-between items-baseline text-[10px] font-mono uppercase tracking-wider text-white/50">
                    <span>
                      DECK SEQUENCE: <span className="text-white font-bold font-mono">0{currentIndex + 1}</span> / 0{scenarios.length}
                    </span>
                    <span className={`px-2 py-0.5 border ${
                      activeScenario.difficulty === 'hard' ? 'bg-rose-500/10 text-rose-400 border-rose-500/20' :
                      activeScenario.difficulty === 'medium' ? 'bg-amber-500/10 text-amber-400 border-amber-500/20' :
                      'bg-emerald-500/10 text-emerald-400 border-emerald-500/20'
                    }`}>
                      DIFFICULTY // {activeScenario.difficulty}
                    </span>
                  </div>

                  {/* Simulator container workspace */}
                  <div className="bg-[#0F0F11] border border-white/10 overflow-hidden relative">
                    <div class="bg-black/60 px-5 py-4 border-b border-white/10 flex items-center justify-between">
                      <div className="flex gap-2">
                        <span className="w-2.5 h-2.5 bg-rose-500/50 rounded-full"></span>
                        <span className="w-2.5 h-2.5 bg-amber-500/50 rounded-full"></span>
                        <span className="w-2.5 h-2.5 bg-emerald-500/50 rounded-full"></span>
                      </div>
                      <span className="text-[10px] uppercase tracking-widest text-[#A0A0A5] font-mono">
                        {activeScenario.type === 'url' ? 'Hostname Inspection' : (activeScenario.type === 'email' ? 'Workspace Mail client' : 'Secure SMS network')}
                      </span>
                    </div>

                    {/* Canvas contents */}
                    <div className="p-8 bg-black/30 min-h-[220px] text-white flex flex-col justify-between">
                      {activeScenario.type === 'email' && (
                        <div className="space-y-6">
                          <div className="border-b border-white/5 pb-4 space-y-2 text-xs font-mono">
                            <div>
                              <span className="text-white/40 mr-2 uppercase tracking-[0.1em] text-[9px]">Sender:</span>
                              <code className="text-rose-300 font-semibold bg-white/5 px-2 py-1 border border-white/10 select-all font-mono">{activeScenario.senderOrDomain}</code>
                            </div>
                            <div>
                              <span className="text-white/40 mr-2 uppercase tracking-[0.1em] text-[9px]">Subject:</span>
                              <span className="text-white font-sans">{activeScenario.subjectOrUrl}</span>
                            </div>
                          </div>
                          <div className="p-6 bg-white/5 border border-white/10 text-xs md:text-sm text-white/80 whitespace-pre-line leading-relaxed font-sans font-medium">
                            {activeScenario.content}
                          </div>
                        </div>
                      )}

                      {activeScenario.type === 'sms' && (
                        <div className="max-w-md mx-auto w-full bg-black/60 border border-white/10 p-5 space-y-4">
                          <div className="flex justify-between items-center text-[9px] text-[#A0A0A5] font-mono uppercase tracking-widest pb-2 border-b border-white/5">
                            <span>Sender: {activeScenario.senderOrDomain}</span>
                            <span>SMS Broadcast</span>
                          </div>
                          <div className="p-4 bg-white/5 border border-white/10 text-xs text-white/90 leading-relaxed font-mono">
                            {activeScenario.content}
                          </div>
                        </div>
                      )}

                      {activeScenario.type === 'url' && (
                        <div className="space-y-6 py-4 text-center">
                          <div className="inline-flex p-4 bg-black/60 border border-white/10">
                            🌐
                          </div>
                          <div className="space-y-2 max-w-xl mx-auto">
                            <label className="text-[9px] text-white/40 font-mono uppercase tracking-[0.2em] block">Lookalike Domain Evaluated</label>
                            <code className="block bg-black/60 p-4 text-sm text-rose-300 font-mono break-all border border-white/10 select-all leading-normal">{activeScenario.subjectOrUrl}</code>
                          </div>
                          <p className="text-xs text-white/60 leading-relaxed max-w-md mx-auto">
                            {activeScenario.content}
                          </p>
                        </div>
                      )}
                    </div>

                    {/* Footer Choice options */}
                    <div className="bg-black/60 p-4 border-t border-white/10 flex flex-col sm:flex-row gap-4">
                      <button
                        disabled={hasAnswered}
                        onClick={() => handleDecision(false)}
                        className={`px-6 py-4 text-xs font-semibold uppercase tracking-widest transition-colors duration-150 rounded-none cursor-pointer flex-1 justify-center inline-flex items-center gap-2 ${
                          hasAnswered
                            ? 'bg-transparent text-white/20 border border-white/5'
                            : 'bg-[#0F0F11] text-white border border-white/20 hover:bg-white hover:text-black'
                        }`}
                      >
                        ✔ Mark Safe
                      </button>

                      <button
                        disabled={hasAnswered}
                        onClick={() => handleDecision(true)}
                        className={`px-6 py-4 text-xs font-semibold uppercase tracking-widest transition-colors duration-150 rounded-none cursor-pointer flex-1 justify-center inline-flex items-center gap-2 ${
                          hasAnswered
                            ? 'bg-transparent text-white/20 border border-white/5'
                            : 'bg-rose-500 text-white hover:bg-rose-600'
                        }`}
                      >
                        ⚠ Mark Phishing
                      </button>
                    </div>
                  </div>

                  {/* Interactive Feedbacks panel */}
                  {hasAnswered && (
                    <div className={`p-8 border animate-fade-in space-y-6 ${
                      selectedAns === activeScenario.isPhishing
                        ? 'bg-emerald-500/5 border-emerald-500/20'
                        : 'bg-rose-500/5 border-rose-500/20'
                    }`}>
                      <div className="flex flex-col sm:flex-row justify-between sm:items-baseline gap-2 pb-4 border-b border-white/10">
                        <span className="text-sm font-bold uppercase tracking-wider text-white font-mono">
                          {selectedAns === activeScenario.isPhishing ? '✔ Decision Checked Correct!' : '🚨 Firewall Breeched! Key Leak alert'}
                        </span>
                        
                        <span className={`text-[9px] font-mono px-3 py-1 border uppercase font-bold tracking-widest ${
                          activeScenario.isPhishing ? 'bg-rose-500/10 text-rose-400 border-rose-500/20' : 'bg-emerald-500/10 text-emerald-400 border-emerald-500/20'
                        }`}>
                          {activeScenario.isPhishing ? 'Phishing Attempt' : 'Legitimate Asset'}
                        </span>
                      </div>

                      {activeScenario.isPhishing && activeScenario.phishingIndicators.length > 0 && (
                        <div className="space-y-3">
                          <span className="text-[10px] font-mono uppercase tracking-widest text-[#A0A0A5] block">Malicious signature cues identified:</span>
                          <ul className="space-y-2">
                            {activeScenario.phishingIndicators.map((ind, i) => (
                              <li key={i} className="text-xs text-rose-400 bg-rose-500/5 border border-rose-500/10 p-3 font-mono leading-relaxed flex gap-2">
                                <span className="text-white/30">[{i+1}]</span>
                                <span>{ind}</span>
                              </li>
                            ))}
                          </ul>
                        </div>
                      )}

                      <div className="space-y-1.5">
                        <span className="text-[10px] font-mono uppercase tracking-widest text-[#A0A0A5] block">Simulation Advisory study notes:</span>
                        <p className="text-sm text-white/80 leading-relaxed font-serif italic">{activeScenario.explanation}</p>
                      </div>

                      <div className="flex justify-end pt-2">
                        <button
                          onClick={handleNext}
                          className="px-6 py-3 bg-white text-black font-semibold text-xs tracking-widest uppercase hover:bg-neutral-200 transition-colors rounded-none inline-flex items-center gap-2 cursor-pointer font-sans"
                        >
                          Next Scenario &rarr;
                        </button>
                      </div>
                    </div>
                  )}
                </div>

                <div className="space-y-6">
                  <div className="bg-[#0F0F11] border border-white/10 p-6 space-y-6">
                    <h3 className="text-xs font-bold font-mono text-white uppercase tracking-widest">
                      🏆 Vigilance Field Notes
                    </h3>
                    <ul className="space-y-6 text-xs text-white/70 leading-relaxed font-sans">
                      <li className="space-y-2">
                        <strong className="text-white font-mono text-[10px] uppercase tracking-widest block border-b border-white/5 pb-1">01 / Askew ASCII elements</strong>
                        <p className="text-white/60">
                          Always evaluate subdomain depth structures. Scam domains append trusted brand words at the front like <code className="bg-white/5 px-1 pb-0.5 font-mono text-[10px] text-rose-300">paypal.login-secure.xyz</code>, masquerading as official targets.
                        </p>
                      </li>
                      <li className="space-y-2">
                        <strong className="text-white font-mono text-[10px] uppercase tracking-widest block border-b border-white/5 pb-1">02 / Artificial Urgency</strong>
                        <p className="text-white/60">
                          Legitimate banking, social desk, and developer portals rarely request instant action inside tight hours window (e.g. "Locked in 4 hours") without previous official warnings.
                        </p>
                      </li>
                    </ul>
                  </div>
                </div>
              </div>
            )}
          </div>
        );
      }

      // -------------------------------------------------------------
      // Main Application Entry Coordinator
      // -------------------------------------------------------------
      function App() {
        const [activeTab, setActiveTab] = useState('dashboard');
        const [news, setNews] = useState(INITIAL_NEWS);
        const [reports, setReports] = useState([]);
        const [mobileMenuOpen, setMobileMenuOpen] = useState(false);

        const handleAddNews = (item) => {
          setNews((prev) => [item, ...prev]);
        };

        const handleAddReport = (report) => {
          setReports((prev) => [report, ...prev]);
        };

        return (
          <div className="min-h-screen bg-[#0A0A0B] text-[#E0E0E0] flex flex-col font-sans">
            {/* Top Security alert ribbon */}
            <div className="bg-[#0F0F11] border-b border-white/10 text-center py-2.5 px-4 flex items-center justify-center gap-2">
              <span className="flex h-1.5 w-1.5 relative">
                <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-rose-400 opacity-75"></span>
                <span className="relative inline-flex rounded-full h-1.5 w-1.5 bg-rose-500"></span>
              </span>
              <span className="text-[10px] font-mono tracking-widest text-white/60 uppercase">
                SECURE PROTOCOL // STANDALONE OFFLINE SINGLE-FILE CLIENT ACTIVE // ZERO BUILD COMPILE REQUIRED
              </span>
            </div>

            {/* Header */}
            <header className="sticky top-0 z-40 bg-[#0A0A0B]/90 backdrop-blur-md border-b border-white/10">
              <div className="max-w-7xl mx-auto px-6 lg:px-8">
                <div className="flex justify-between items-baseline h-20">
                  <div 
                    className="flex items-baseline gap-4 cursor-pointer"
                    onClick={() => { setActiveTab('dashboard'); setMobileMenuOpen(false); }}
                  >
                    <span className="text-3xl font-serif italic tracking-tight text-white select-none">
                      SecuriFeed
                    </span>
                    <span className="hidden sm:inline text-[9px] tracking-[0.25em] uppercase text-white/40 font-mono">
                      PhishDetect // Standalone Build
                    </span>
                  </div>

                  {/* Desktop menu */}
                  <nav className="hidden md:flex items-baseline gap-8 text-[11px] uppercase tracking-widest font-semibold font-mono">
                    <button
                      onClick={() => setActiveTab('dashboard')}
                      className={`py-1 transition duration-150 cursor-pointer ${
                        activeTab === 'dashboard' ? 'text-white border-b border-white' : 'text-white/40 hover:text-white'
                      }`}
                    >
                      Dashboard
                    </button>
                    
                    <button
                      onClick={() => setActiveTab('analyzer')}
                      className={`py-1 transition duration-150 cursor-pointer ${
                        activeTab === 'analyzer' ? 'text-white border-b border-white' : 'text-white/40 hover:text-white'
                      }`}
                    >
                      Analyzer
                    </button>

                    <button
                      onClick={() => setActiveTab('feed')}
                      className={`py-1 transition duration-150 cursor-pointer ${
                        activeTab === 'feed' ? 'text-white border-b border-white' : 'text-white/40 hover:text-white'
                      }`}
                    >
                      Intelligence Feed
                    </button>

                    <button
                      onClick={() => setActiveTab('game')}
                      className={`py-1 transition duration-150 cursor-pointer ${
                        activeTab === 'game' ? 'text-emerald-400 border-b border-emerald-400' : 'text-white/40 hover:text-white'
                      }`}
                    >
                      Academy Game
                    </button>
                  </nav>

                  <div className="hidden lg:flex items-center gap-3 font-mono text-[9px]">
                    <div className="text-emerald-400 border border-emerald-500/20 bg-emerald-500/5 py-1 px-3">
                      ● Standalone Local Sandbox Ready
                    </div>
                  </div>

                  <div className="md:hidden flex items-center h-full">
                    <button
                      onClick={() => setMobileMenuOpen(!mobileMenuOpen)}
                      className="p-1.5 bg-white/5 border border-white/10 rounded-sm text-white/60 hover:text-white"
                    >
                      MENU //
                    </button>
                  </div>
                </div>
              </div>

              {/* Mobile options */}
              {mobileMenuOpen && (
                <div className="md:hidden bg-[#0F0F11] border-b border-white/10 px-6 py-5 space-y-3 animate-fade-in font-mono text-[10px] uppercase tracking-widest">
                  <button
                    onClick={() => { setActiveTab('dashboard'); setMobileMenuOpen(false); }}
                    className={`w-full text-left py-2 flex items-center justify-between ${
                      activeTab === 'dashboard' ? 'text-white font-bold' : 'text-white/40'
                    }`}
                  >
                    <span>Dashboard Overview</span>
                    <span>&rarr;</span>
                  </button>

                  <button
                    onClick={() => { setActiveTab('analyzer'); setMobileMenuOpen(false); }}
                    className={`w-full text-left py-2 flex items-center justify-between ${
                      activeTab === 'analyzer' ? 'text-white font-bold' : 'text-white/40'
                    }`}
                  >
                    <span>Suspicious Link Analyzer</span>
                    <span>&rarr;</span>
                  </button>

                  <button
                    onClick={() => { setActiveTab('feed'); setMobileMenuOpen(false); }}
                    className={`w-full text-left py-2 flex items-center justify-between ${
                      activeTab === 'feed' ? 'text-white font-bold' : 'text-white/40'
                    }`}
                  >
                    <span>Live Threat Intelligence</span>
                    <span>&rarr;</span>
                  </button>

                  <button
                    onClick={() => { setActiveTab('game'); setMobileMenuOpen(false); }}
                    className={`w-full text-left py-2 flex items-center justify-between ${
                      activeTab === 'game' ? 'text-emerald-400 font-bold' : 'text-white/40'
                    }`}
                  >
                    <span>Academy Reflex Game</span>
                    <span>&rarr;</span>
                  </button>
                </div>
              )}
            </header>

            {/* Stage Page Render */}
            <main className="flex-1 max-w-7xl w-full mx-auto px-6 lg:px-8 py-10">
              {activeTab === 'dashboard' && (
                <DashboardView 
                  newsList={news} 
                  threatReports={reports} 
                  setActiveTab={setActiveTab} 
                  scenariosCount={scenariosCount => GAME_SCENARIOS.length}
                />
              )}
              {activeTab === 'analyzer' && <AnalyzerView />}
              {activeTab === 'feed' && (
                <ThreatIntelView 
                  newsList={news} 
                  threatReports={reports} 
                  onAddNews={handleAddNews} 
                  onAddReport={handleAddReport}
                />
              )}
              {activeTab === 'game' && <PhishGameView />}
            </main>

            {/* Sub-footer */}
            <footer className="bg-black/40 border-t border-white/5 py-8 mt-16 text-[9px] font-mono tracking-[0.2em] uppercase text-white/30">
              <div className="max-w-7xl mx-auto px-6 lg:px-8 text-center flex flex-col md:flex-row justify-between items-center gap-4">
                <div>SecuriFeed — Cyber hygiene tracker utility.</div>
                <div>LOCAL_STANDALONE_SEC_DECK: VERIFIED</div>
              </div>
            </footer>
          </div>
        );
      }

      // Render the Application Node
      const container = document.getElementById('root');
      const root = ReactDOM.createRoot(container);
      root.render(<App />);
    </script>
  </body>
</html>
